baseURL = "https://hhtech.github.io/hugo-blowfish-site/"
defaultContentLanguage = "zh-cn"
enableRobotsTXT = true
paginate = 10
summaryLength = 20
theme = "github.com/nunocoracao/blowfish/v2"
title = "Blowfish"

[build]
  writeStats = true

[imaging]
  anchor = "Center"

[languages]
  [languages.zh-cn]
    contentDir = "content"
    languageCode = "zh-CN"
    languageName = "简体中文"
    weight = 1

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[module]
  [[module.imports]]
    path = "github.com/nunocoracao/blowfish/v2"

[outputs]
  home = ["HTML", "RSS", "JSON"]
