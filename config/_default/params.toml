colorScheme = "blowfish"
defaultAppearance = "light"
autoSwitchAppearance = true
enableSearch = true
enableCodeCopy = true
mainSections = ["docs"]
logo = "blowfish-logo.png"

[header]
  layout = "basic"

[footer]
  showAppearanceSwitcher = true
  showCopyright = true
  showScrollToTop = true
  showThemeAttribution = true

[homepage]
  layout = "profile"
  showRecent = true
  recentLimit = 10
  cardView = true

[article]
  showDate = true
  showReadingTime = true
  showTaxonomies = true
  showAuthor = true
  showWordCount = true

[list]
  showSummary = true
  showCards = true
  cardView = true

[author]
  name = "Blowfish"
  image = "blowfish-logo.png"
  headline = "一个强大、轻量、适合中文内容展示的 Hugo 主题"
  bio = "这个示例站点保留了 Blowfish 官方风格，同时使用更稳定的 profile 首页布局，方便你继续扩展。"
  links = [
    { github = "https://github.com/nunocoracao/blowfish" }
  ]
