colorScheme = "blowfish"
defaultAppearance = "light"
autoSwitchAppearance = true
enableSearch = true
enableCodeCopy = true
mainSections = ["docs"]

[header]
  layout = "basic"

[logo]
  image = "blowfish-logo.png"
  imageDark = "blowfish-logo.png"
  title = "Blowfish"

[footer]
  showAppearanceSwitcher = true
  showCopyright = true
  showScrollToTop = true
  showThemeAttribution = true

[homepage]
  layout = "profile"
  showRecent = true
  recentLimit = 10
  cardView = true

[article]
  showDate = true
  showReadingTime = true
  showTaxonomies = true
  showAuthor = true
  showWordCount = true

[list]
  showSummary = true
  showCards = true
  cardView = true

[author]
  name = "Blowfish"
  image = "blowfish-logo.png"
  headline = "一个强大、轻量级的 Hugo 主题。"
  bio = "这是一个稳定、适合中文阅读的 Blowfish 演示站点。"
  links = [
    { x-twitter = "https://twitter.com/burufugu" },
    { github = "https://github.com/nunocoracao/blowfish" }
  ]
