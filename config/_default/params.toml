colorScheme = "blowfish"
defaultAppearance = "light"
autoSwitchAppearance = true
enableSearch = true
enableCodeCopy = true
mainSections = ["posts"]

[header]
  layout = "basic"

[footer]
  showAppearanceSwitcher = true
  showCopyright = true
  showScrollToTop = true
  showThemeAttribution = true

[homepage]
  layout = "profile"
  showRecent = true
  recentLimit = 10
  cardView = true

[article]
  showDate = true
  showReadingTime = true
  showTaxonomies = true
  showAuthor = true
  showWordCount = true

[list]
  showSummary = true
  showCards = true
  cardView = true

[author]
  name = "Xing Fu"
  headline = "记录阅读、随想与生活片段"
  bio = "这里收录从原博客迁移过来的文章内容，主题与部署方式保留 Hugo + Blowfish + GitHub Pages。"
